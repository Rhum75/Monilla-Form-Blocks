<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | Monilla</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <main class="admin-login-page">
      <section class="admin-login-shell" aria-label="Admin Login Page">
        <img
          src="../images/home_product/LOGO.png"
          alt="Monilla Food Store"
          class="admin-login-logo"
        />

        <section class="admin-login-card" aria-label="Admin Login Form">
          <h2>Admin Login</h2>
          <p class="admin-login-sub">Please sign in to your admin account</p>

          <form id="adminLoginForm" novalidate>
            <label for="adminEmail">Email</label>
            <div class="admin-input-wrap">
              <span class="admin-input-icon" aria-hidden="true">@</span>
              <input
                id="adminEmail"
                name="email"
                type="email"
                placeholder="admin@example.com"
                autocomplete="username"
                required
              />
            </div>

            <label for="adminPassword">Password</label>
            <div class="admin-input-wrap">
              <span class="admin-input-icon" aria-hidden="true">*</span>
              <input
                id="adminPassword"
                name="password"
                type="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              />
            </div>

            <div class="admin-login-row">
              <label class="admin-remember-wrap" for="adminRemember">
                <input id="adminRemember" type="checkbox" />
                <span>Remember me</span>
              </label>
              <a class="admin-forgot" href="#">Forgot password?</a>
            </div>

            <button type="submit" id="adminLoginBtn">Login</button>
            <p class="admin-login-message" id="adminLoginMessage"></p>
          </form>
        </section>

        <p class="admin-login-footer">
          © 2026 Monilla Concrete Product Manufacturing. All rights reserved.
        </p>
      </section>
    </main>

    <script src="login.js"></script>
  </body>
</html>
